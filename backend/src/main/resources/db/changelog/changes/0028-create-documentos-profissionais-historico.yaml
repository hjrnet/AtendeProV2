databaseChangeLog:
  - changeSet:
      id: 0028-create-documentos-profissionais-historico
      author: codex
      changes:
        - createTable:
            tableName: documentos_profissionais_historico
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: documento_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: empresa_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: versao_anterior
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: versao_nova
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: acao
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: titulo_anterior
                  type: varchar(180)
                  constraints:
                    nullable: false
              - column:
                  name: conteudo_anterior
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status_anterior
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: titulo_novo
                  type: varchar(180)
                  constraints:
                    nullable: false
              - column:
                  name: conteudo_novo
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status_novo
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: motivo
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: usuario_id
                  type: uuid
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: documentos_profissionais_historico
            baseColumnNames: documento_id
            referencedTableName: documentos_profissionais
            referencedColumnNames: id
            constraintName: fk_documentos_profissionais_historico_documento
        - addForeignKeyConstraint:
            baseTableName: documentos_profissionais_historico
            baseColumnNames: empresa_id
            referencedTableName: empresas
            referencedColumnNames: id
            constraintName: fk_documentos_profissionais_historico_empresa
        - addForeignKeyConstraint:
            baseTableName: documentos_profissionais_historico
            baseColumnNames: usuario_id
            referencedTableName: auth_usuarios
            referencedColumnNames: id
            constraintName: fk_documentos_profissionais_historico_usuario
        - createIndex:
            tableName: documentos_profissionais_historico
            indexName: idx_documentos_historico_empresa_documento
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: documento_id
        - createIndex:
            tableName: documentos_profissionais_historico
            indexName: idx_documentos_historico_documento_versao
            columns:
              - column:
                  name: documento_id
              - column:
                  name: versao_nova
        - createIndex:
            tableName: documentos_profissionais_historico
            indexName: idx_documentos_historico_acao
            columns:
              - column:
                  name: acao
