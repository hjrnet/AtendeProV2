databaseChangeLog:
  - changeSet:
      id: 0012-create-clientes-pacientes
      author: codex
      changes:
        - createTable:
            tableName: clientes_pacientes
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: empresa_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: nome
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: area
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: documento
                  type: varchar(30)
              - column:
                  name: email
                  type: varchar(160)
              - column:
                  name: telefone
                  type: varchar(40)
              - column:
                  name: data_nascimento
                  type: date
              - column:
                  name: observacoes
                  type: varchar(1000)
              - column:
                  name: ativo
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: clientes_pacientes
            baseColumnNames: empresa_id
            referencedTableName: empresas
            referencedColumnNames: id
            constraintName: fk_clientes_pacientes_empresas
        - createIndex:
            tableName: clientes_pacientes
            indexName: idx_clientes_pacientes_empresa_nome
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: nome
        - createIndex:
            tableName: clientes_pacientes
            indexName: idx_clientes_pacientes_empresa_area
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: area
        - createIndex:
            tableName: clientes_pacientes
            indexName: idx_clientes_pacientes_empresa_ativo
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: ativo
