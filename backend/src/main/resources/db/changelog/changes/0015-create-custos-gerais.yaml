databaseChangeLog:
  - changeSet:
      id: 0015-create-custos-gerais
      author: codex
      changes:
        - createTable:
            tableName: custos_gerais
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: empresa_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: descricao
                  type: varchar(180)
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: categoria
                  type: varchar(120)
              - column:
                  name: valor
                  type: numeric(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: competencia
                  type: varchar(7)
              - column:
                  name: ativo
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: custos_gerais
            baseColumnNames: empresa_id
            referencedTableName: empresas
            referencedColumnNames: id
            constraintName: fk_custos_gerais_empresas
        - createIndex:
            tableName: custos_gerais
            indexName: idx_custos_gerais_empresa_tipo
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: tipo
        - createIndex:
            tableName: custos_gerais
            indexName: idx_custos_gerais_empresa_categoria
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: categoria
