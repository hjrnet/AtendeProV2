databaseChangeLog:
  - changeSet:
      id: 0002-create-auth-usuarios
      author: codex
      changes:
        - createTable:
            tableName: auth_usuarios
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(180)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: senha_hash
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: perfis
                  type: text[]
                  constraints:
                    nullable: false
              - column:
                  name: ativo
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: auth_usuarios
            indexName: idx_auth_usuarios_email
            columns:
              - column:
                  name: email
