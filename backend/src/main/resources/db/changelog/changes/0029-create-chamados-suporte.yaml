databaseChangeLog:
  - changeSet:
      id: 0029-create-chamados-suporte
      author: codex
      changes:
        - createTable:
            tableName: chamados_suporte
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: empresa_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: solicitante_usuario_id
                  type: uuid
              - column:
                  name: solicitante_nome
                  type: varchar(160)
              - column:
                  name: solicitante_email
                  type: varchar(180)
              - column:
                  name: titulo
                  type: varchar(180)
                  constraints:
                    nullable: false
              - column:
                  name: descricao
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: prioridade
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: categoria
                  type: varchar(80)
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createTable:
            tableName: chamados_suporte_mensagens
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chamado_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: autor_usuario_id
                  type: uuid
              - column:
                  name: autor_nome
                  type: varchar(160)
              - column:
                  name: origem
                  type: varchar(40)
                  constraints:
                    nullable: false
              - column:
                  name: mensagem
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: chamados_suporte
            baseColumnNames: empresa_id
            referencedTableName: empresas
            referencedColumnNames: id
            constraintName: fk_chamados_suporte_empresa
        - addForeignKeyConstraint:
            baseTableName: chamados_suporte
            baseColumnNames: solicitante_usuario_id
            referencedTableName: auth_usuarios
            referencedColumnNames: id
            constraintName: fk_chamados_suporte_solicitante
        - addForeignKeyConstraint:
            baseTableName: chamados_suporte_mensagens
            baseColumnNames: chamado_id
            referencedTableName: chamados_suporte
            referencedColumnNames: id
            constraintName: fk_chamados_suporte_mensagens_chamado
        - addForeignKeyConstraint:
            baseTableName: chamados_suporte_mensagens
            baseColumnNames: autor_usuario_id
            referencedTableName: auth_usuarios
            referencedColumnNames: id
            constraintName: fk_chamados_suporte_mensagens_autor
        - createIndex:
            tableName: chamados_suporte
            indexName: idx_chamados_suporte_empresa_status
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: status
        - createIndex:
            tableName: chamados_suporte
            indexName: idx_chamados_suporte_empresa_prioridade
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: prioridade
        - createIndex:
            tableName: chamados_suporte
            indexName: idx_chamados_suporte_empresa_atualizado
            columns:
              - column:
                  name: empresa_id
              - column:
                  name: atualizado_em
        - createIndex:
            tableName: chamados_suporte_mensagens
            indexName: idx_chamados_suporte_mensagens_chamado_criado
            columns:
              - column:
                  name: chamado_id
              - column:
                  name: criado_em
