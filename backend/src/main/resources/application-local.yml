spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:atendepro}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:atendepro}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:atendepro}}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
      nome: ${APP_BOOTSTRAP_ADMIN_NOME:Administrador AtendePro}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@atendepro.local}
      senha: ${APP_BOOTSTRAP_ADMIN_SENHA:AtendePro@123}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt-issuer: ${JWT_ISSUER:atendepro-local}
    jwt-secret: ${JWT_SECRET:troque-este-segredo-localmente}
    jwt-expiracao-minutos: ${JWT_EXPIRACAO_MINUTOS:60}
    jwt-refresh-expiracao-dias: ${JWT_REFRESH_EXPIRACAO_DIAS:7}
    senha-recuperacao-expiracao-minutos: ${SENHA_RECUPERACAO_EXPIRACAO_MINUTOS:30}
    expor-token-recuperacao-local: ${EXPOR_TOKEN_RECUPERACAO_LOCAL:true}
