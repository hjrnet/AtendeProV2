spring:
  application:
    name: atendepro-backend
  profiles:
    default: local

server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: AtendePro Backend
    description: SaaS profissional multiempresa e multiárea
