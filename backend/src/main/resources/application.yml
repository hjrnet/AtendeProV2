spring:
  application:
    name: atendepro-backend
  profiles:
    default: local
  main:
    banner-mode: console

server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: AtendePro Backend
    description: SaaS profissional multiempresa e multiárea

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha
