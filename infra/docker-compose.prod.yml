services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      APP_HARDENING_ENABLED: ${APP_HARDENING_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "${BACKEND_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${BACKEND_PORT:-8080}/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      WEB_PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "${WEB_PORT:-3000}"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d/atendepro.conf:/etc/nginx/conf.d/atendepro.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
